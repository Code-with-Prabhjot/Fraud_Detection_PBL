<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOC THREAT DETECTION SYSTEM</title>
    <style>
        :root {
            --hacker-green: #00ff41;
            --threat-red: #ff003c;
            --bg-black: #050505;
            --panel-border: rgba(0, 255, 65, 0.3);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace; /* Strict terminal font */
        }

        /* Radar Grid Background */
        body { 
            margin: 0; 
            min-height: 100vh; 
            background-color: var(--bg-black);
            color: var(--hacker-green);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            position: relative;
        }

        /* Scanning Line Animation */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 5px;
            background: var(--hacker-green);
            opacity: 0.5;
            box-shadow: 0 0 20px var(--hacker-green);
            animation: scanLine 8s linear infinite;
            z-index: -1;
        }

        @keyframes scanLine {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .header { 
            text-align: center; 
            margin-bottom: 40px; 
            border: 1px solid var(--panel-border);
            padding: 20px 40px;
            background: rgba(0, 255, 65, 0.02);
            text-transform: uppercase;
        }

        .header h1 { 
            font-weight: bold; 
            letter-spacing: 4px; 
            font-size: 36px;
            margin: 0 0 10px 0;
            color: white;
            text-shadow: 0 0 10px var(--hacker-green);
        }

        .header p { 
            color: var(--hacker-green); 
            font-size: 14px; 
            margin: 0;
        }

        /* Mechanical Override Button */
        .sweep-btn {
            background: transparent;
            border: 2px solid var(--threat-red); 
            padding: 20px 50px; 
            color: var(--threat-red);
            font-size: 18px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer; 
            transition: all 0.2s;
            margin-bottom: 50px;
            box-shadow: inset 0 0 15px rgba(255, 0, 60, 0.1);
            border-radius: 0; /* Square edges */
        }

        .sweep-btn:hover { 
            background: var(--threat-red);
            color: var(--bg-black);
            box-shadow: 0 0 30px var(--threat-red); 
        }

        /* Wireframe Dashboard */
        .dashboard {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid var(--hacker-green);
            padding: 40px; 
            width: 100%; 
            max-width: 1000px; 
            display: none;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.1);
        }

        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .stat-card { 
            border: 1px solid var(--panel-border);
            padding: 20px; 
            text-align: center;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0, 255, 65, 0.02) 10px,
                rgba(0, 255, 65, 0.02) 20px
            );
        }

        .stat-value { 
            font-size: 48px; 
            font-weight: bold; 
            color: white; 
        }

        .stat-label { 
            color: var(--hacker-green); 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 3px; 
            margin-top: 10px;
        }

        /* Terminal Table Design */
        h3 {
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px dashed var(--hacker-green);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
        }

        th { 
            color: var(--hacker-green); 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 1px;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid var(--hacker-green);
        }

        td { 
            padding: 15px; 
            border-bottom: 1px solid var(--panel-border);
            color: white;
        }

        /* Flashing Fraud Row */
        .fraud-row {
            background: rgba(255, 0, 60, 0.1);
            border-left: 4px solid var(--threat-red);
        }
        
        .fraud-row td {
            color: var(--threat-red);
        }

        .fraud-row td:first-child {
            color: white;
        }

        /* Flashing Badge */
        .badge { 
            background: var(--threat-red); 
            color: white;
            padding: 4px 10px; 
            font-size: 12px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: flashAlert 1s infinite;
        }

        @keyframes flashAlert { 
            0%, 49% { opacity: 1; background: var(--threat-red); color: white;} 
            50%, 100% { opacity: 0.8; background: transparent; border: 1px solid var(--threat-red); color: var(--threat-red);} 
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>System Override: SOC Monitor</h1>
        <p>[// CONNECTED TO NATIVE C-ENGINE KERNEL //]</p>
    </div>

    <button class="sweep-btn" onclick="runSweep()">Execute Threat Sweep</button>

    <div class="dashboard" id="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="val-processed">0</div>
                <div class="stat-label">System Rows Parsed</div>
            </div>
            <div class="stat-card" style="border-color: var(--threat-red);">
                <div class="stat-value" id="val-frauds" style="color: var(--threat-red);">0</div>
                <div class="stat-label" style="color: var(--threat-red);">Anomalies Detected</div>
            </div>
        </div>

        <h3>[ ! ] Active Threat Log</h3>
        <table>
            <thead>
                <tr>
                    <th>TXN_ID</th>
                    <th>Volume (INR)</th>
                    <th>Time</th>
                    <th>Vector</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <script>
        function runSweep() {
            const btn = document.querySelector('.sweep-btn');
            btn.innerText = "PARSING KERNEL DATA...";
            btn.style.pointerEvents = "none"; 
            
            fetch('/run_sweep', { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                document.getElementById('dashboard').style.display = 'block';
                
                document.getElementById('val-processed').innerText = data.processed;
                document.getElementById('val-frauds').innerText = data.frauds_count;
                
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                
                data.alerts.forEach(alert => {
                    const row = `<tr class="fraud-row">
                        <td>${alert.txn_id}</td>
                        <td style="font-weight: bold;">${alert.amount}</td>
                        <td>${alert.time}</td>
                        <td>${alert.category}</td>
                        <td><span class="badge">BREACH</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                
                btn.innerText = "SWEEP COMPLETED";
                setTimeout(() => {
                    btn.innerText = "Execute Threat Sweep";
                    btn.style.pointerEvents = "auto";
                }, 3000);
            })
            .catch(err => {
                console.error("Error during sweep:", err);
                btn.innerText = "ERR: KERNEL DISCONNECT";
                btn.style.pointerEvents = "auto";
            });
        }
    </script>
</body>
</html>
